<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f0f0f0" rx="8"/>
  <rect x="20" y="18" width="260" height="155" fill="#1e1e1e" rx="6"/>
  <circle cx="36" cy="34" r="5" fill="#ff5f57"/>
  <circle cx="52" cy="34" r="5" fill="#febc2e"/>
  <circle cx="68" cy="34" r="5" fill="#28c840"/>
  <text x="30" y="58" font-family="monospace" font-size="9" fill="#6699cc">$ tellme compress a folder</text>
  <text x="30" y="74" font-family="monospace" font-size="9" fill="#888">AI:</text>
  <rect x="30" y="80" width="240" height="18" fill="#2a2a2a" rx="3"/>
  <text x="36" y="93" font-family="monospace" font-size="9" fill="#4ec9b0">tar -czf archive.tar.gz folder/</text>
  <text x="30" y="116" font-family="monospace" font-size="9" fill="#6699cc">$ tellme find large files</text>
  <text x="30" y="132" font-family="monospace" font-size="9" fill="#888">AI:</text>
  <rect x="30" y="138" width="240" height="18" fill="#2a2a2a" rx="3"/>
  <text x="36" y="151" font-family="monospace" font-size="9" fill="#4ec9b0">find . -size +100M -type f</text>
  <text x="150" y="190" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">tellme</text>
</svg>
